  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

const STORAGE_VERSION = "v6";
const VERSION_KEY = "family-birthdays-version";

const DEFAULT_MEMBERS = [
  { id:1,  name:"Helene",    role:"Mormor",        birthdate:"1946-03-25", imageUrl:null, parentId:null, parent2Id:null, spouseId:2  },
  { id:2,  name:"Stein",     role:"Morfar",         birthdate:"1946-03-05", imageUrl:null, parentId:null, parent2Id:null, spouseId:1  },
  { id:3,  name:"Thomas",    role:"Farfar",         birthdate:"1951-08-22", imageUrl:null, parentId:null, parent2Id:null, spouseId:4  },
  { id:4,  name:"Anita",     role:"Farmor",         birthdate:"1952-01-27", imageUrl:null, parentId:null, parent2Id:null, spouseId:3  },
  { id:5,  name:"Gabriella", role:"Super-Mom",      birthdate:"1977-06-19", imageUrl:null, parentId:1,    parent2Id:2,    spouseId:6  },
  { id:6,  name:"Andreas",   role:"Grand Master",   birthdate:"1976-07-29", imageUrl:null, parentId:3,    parent2Id:4,    spouseId:5  },
  { id:7,  name:"Olivia",    role:"Smartest funniest coolest prettiest most humble / favorite child", birthdate:"2008-06-05", imageUrl:null, parentId:6, parent2Id:5, spouseId:null },
  { id:8,  name:"LUCAS",     role:"Cooler & awesomer than Olivia", birthdate:"2010-09-19", imageUrl:null, parentId:5, parent2Id:6, spouseId:null },
  { id:9,  name:"Liam",      role:"Better than Noah · skills ^ aura · ♾️", birthdate:"2013-02-15", imageUrl:null, parentId:5, parent2Id:6, spouseId:null },
  { id:10, name:"Noah",      role:"Better than Lucas & Liam combined ♾️", birthdate:"2015-08-25", imageUrl:null, parentId:6, parent2Id:5, spouseId:null },

// ── Design tokens (dark theme) ────────────────────────────────────────────────
const D = {
  bg0:    "#0d0f14",   // page bg
  bg1:    "#13161e",   // card bg
  bg2:    "#1a1e2a",   // input / row bg
  bg3:    "#222636",   // hover / subtle
  border: "#ffffff14", // subtle border
  borderHi: "#ffffff28",
  text1:  "#f0f2f8",   // primary text
  text2:  "#8b91a8",   // secondary text
  text3:  "#555c78",   // muted
  accent: "#7c6fef",   // purple accent
  accentLo:"#7c6fef22",
  heart:  "#f472b6",   // pink heart
  line:   "#2d3248",   // tree lines
  green:  "#34d399",
  amber:  "#fbbf24",
  red:    "#f87171",
};

// ── Palette per member ────────────────────────────────────────────────────────
const PALETTE = [
  {fg:"#a78bfa", bg:"#a78bfa18"}, // violet
  {fg:"#34d399", bg:"#34d39918"}, // emerald
  {fg:"#fb923c", bg:"#fb923c18"}, // orange
  {fg:"#f472b6", bg:"#f472b618"}, // pink
  {fg:"#60a5fa", bg:"#60a5fa18"}, // blue
  {fg:"#a3e635", bg:"#a3e63518"}, // lime
  {fg:"#facc15", bg:"#facc1518"}, // yellow
  {fg:"#f87171", bg:"#f8717118"}, // red
];
function palFor(name) { return PALETTE[(name.charCodeAt(0)||0) % PALETTE.length]; }

// ── Date helpers ──────────────────────────────────────────────────────────────
function parseDate(s) {
  if (!s) return null;
  const d = new Date(s + "T00:00:00");
  return isNaN(d) ? null : d;
}
function calcAge(b) {
  const bd = parseDate(b); if (!bd) return null;
  const now = new Date();
  let a = now.getFullYear() - bd.getFullYear();
  if (now < new Date(now.getFullYear(), bd.getMonth(), bd.getDate())) a--;
  return a;
}
function nextBday(b) {
  const bd = parseDate(b); if (!bd) return null;
  const now = new Date();
  let n = new Date(now.getFullYear(), bd.getMonth(), bd.getDate());
  if (n <= now) n = new Date(now.getFullYear()+1, bd.getMonth(), bd.getDate());
  return n;
}
function daysUntil(d) { return Math.ceil((d - new Date()) / 86400000); }
function fmtDate(s) {
  const d = parseDate(s);
  return d ? d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "—";
}
function fmtNext(s) {
  const d = nextBday(s);
  return d ? d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}) : "—";
}

// ── Countdown hook ────────────────────────────────────────────────────────────
function useCountdown(b) {
  const [, tick] = useState(0);
  useEffect(()=>{ const id=setInterval(()=>tick(t=>t+1),1000); return ()=>clearInterval(id); },[]);
  const t = nextBday(b); if (!t) return {days:0,hours:0,minutes:0,seconds:0};
  const diff = Math.max(0, t - new Date());
  return {
    days:   Math.floor(diff/86400000),
    hours:  Math.floor((diff/3600000)%24),
    minutes:Math.floor((diff/60000)%60),
    seconds:Math.floor((diff/1000)%60),
  };
}

// ── Avatar ────────────────────────────────────────────────────────────────────
function Avatar({ member, size=56 }) {
  const { fg, bg } = palFor(member.name);
  return (
    <div style={{
      width:size, height:size, borderRadius:"50%",
      background: member.imageUrl ? "transparent" : bg,
      border:`2px solid ${fg}55`,
      display:"flex", alignItems:"center", justifyContent:"center",
      overflow:"hidden", flexShrink:0, position:"relative",
    }}>
      {member.imageUrl
        ? <img src={member.imageUrl} alt={member.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
        : <span style={{fontSize:size*0.4, fontWeight:500, color:fg, lineHeight:1}}>{member.name.charAt(0).toUpperCase()}</span>
      }
    </div>
  );
}

// ── Birthday Card ─────────────────────────────────────────────────────────────
function BirthdayCard({ member, onEdit, onDelete }) {
  const next  = nextBday(member.birthdate);
  const days  = next ? daysUntil(next) : null;
  const soon  = days !== null && days <= 30;
  const today = days === 0;
  const age   = calcAge(member.birthdate);
  const { fg } = palFor(member.name);
  const cd = useCountdown(member.birthdate);
  const [hov, setHov] = useState(false);

  return (
    <div
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{
        background: D.bg1,
        borderRadius:16,
        border: soon ? `1px solid ${fg}55` : `1px solid ${D.border}`,
        padding:"20px 18px 16px",
        display:"flex", flexDirection:"column", alignItems:"center",
        position:"relative", overflow:"hidden",
        transition:"transform 0.18s ease, border-color 0.18s ease",
        transform: hov ? "translateY(-4px)" : "none",
        cursor:"default",
      }}
    >
      {/* Subtle top glow on upcoming */}
      {soon && (
        <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${fg},transparent)`,borderRadius:"16px 16px 0 0"}}/>
      )}

      {/* Badge */}
      {soon && (
        <div style={{
          position:"absolute",top:12,right:12,
          background: today ? fg : `${fg}22`,
          color: today ? "#0d0f14" : fg,
          fontSize:10,fontWeight:600,padding:"3px 9px",borderRadius:99,
          border: today?"none":`1px solid ${fg}44`,
          letterSpacing:"0.05em",textTransform:"uppercase",
          animation: today?"todaypulse 2s ease-in-out infinite":"none",
        }}>
          {today ? "🎂 Today" : `${days}d away`}
        </div>
      )}

      {/* Avatar + age bubble */}
      <div style={{position:"relative",marginBottom:14}}>
        <Avatar member={member} size={72}/>
        {age !== null && (
          <div style={{
            position:"absolute",bottom:-4,right:-6,
            background:D.bg3, border:`1px solid ${D.borderHi}`,
            borderRadius:99,padding:"1px 8px",
            fontSize:12,fontWeight:500,color:D.text1,
          }}>{age}</div>
        )}
      </div>

      <div style={{fontSize:17,fontWeight:500,color:D.text1,marginBottom:4,textAlign:"center"}}>{member.name}</div>
      <div style={{
        fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",
        color:fg, background:`${fg}18`,
        padding:"3px 10px",borderRadius:99,marginBottom:16,
        maxWidth:"92%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
      }} title={member.role}>{member.role}</div>

      {/* Info rows */}
      <div style={{width:"100%",display:"flex",flexDirection:"column",gap:6}}>
        {[
          {icon:"ti-cake",     label:"Born",       val:fmtDate(member.birthdate)},
          {icon:"ti-calendar", label:"Next party",  val:fmtNext(member.birthdate), hi:soon},
        ].map(({icon,label,val,hi})=>(
          <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:D.bg2,borderRadius:10,border:`1px solid ${D.border}`}}>
            <span style={{color:D.text2,display:"flex",alignItems:"center",gap:7,fontSize:12}}>
              <i className={`ti ${icon}`} style={{fontSize:13,color:D.text3}} aria-hidden="true"/> {label}
            </span>
            <span style={{fontSize:12,fontWeight:500,color:hi?fg:D.text1}}>{val}</span>
          </div>
        ))}

        {/* Countdown */}
        <div style={{padding:"10px 12px",background:D.bg2,borderRadius:10,border:`1px solid ${D.border}`}}>
          <div style={{fontSize:10,color:D.text3,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:8,display:"flex",alignItems:"center",gap:5}}>
            <i className="ti ti-clock" style={{fontSize:12}} aria-hidden="true"/> Countdown
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
            {[["Days",cd.days],["Hrs",cd.hours],["Min",cd.minutes],["Sec",cd.seconds]].map(([lbl,val])=>(
              <div key={lbl} style={{textAlign:"center",background:D.bg3,borderRadius:8,padding:"7px 4px",border:`1px solid ${D.border}`}}>
                <div style={{fontSize:16,fontWeight:500,color:D.text1,lineHeight:1.2,fontVariantNumeric:"tabular-nums"}}>{String(val).padStart(2,"0")}</div>
                <div style={{fontSize:9,color:D.text3,textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>{lbl}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Action buttons — always visible on dark bg */}
      <div style={{display:"flex",gap:8,marginTop:14,width:"100%"}}>
        <button
          onClick={()=>onEdit(member)}
          style={{flex:1,padding:"7px",fontSize:12,border:`1px solid ${D.borderHi}`,borderRadius:8,cursor:"pointer",background:"transparent",color:D.text2,display:"flex",alignItems:"center",justifyContent:"center",gap:5,transition:"background 0.12s,color 0.12s"}}
          onMouseEnter={e=>{e.currentTarget.style.background=D.bg3;e.currentTarget.style.color=D.text1;}}
          onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=D.text2;}}
        >
          <i className="ti ti-edit" style={{fontSize:13}} aria-hidden="true"/> Edit
        </button>
        <button
          onClick={()=>{ if(confirm(`Remove ${member.name}?`)) onDelete(member.id); }}
          style={{flex:1,padding:"7px",fontSize:12,border:`1px solid ${D.borderHi}`,borderRadius:8,cursor:"pointer",background:"transparent",color:D.text2,display:"flex",alignItems:"center",justifyContent:"center",gap:5,transition:"background 0.12s,color 0.12s"}}
          onMouseEnter={e=>{e.currentTarget.style.background="#f8717118";e.currentTarget.style.color=D.red;}}
          onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=D.text2;}}
        >
          <i className="ti ti-trash" style={{fontSize:13}} aria-hidden="true"/> Remove
        </button>
      </div>
    </div>
  );
}

// ── Member Form ───────────────────────────────────────────────────────────────
function MemberForm({ initial, onSave, onCancel }) {
  const [form, setForm] = useState({name:initial?.name||"",role:initial?.role||"",birthdate:initial?.birthdate||"",imageUrl:initial?.imageUrl||""});
  const [err, setErr] = useState("");
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const submit = e => {
    e.preventDefault();
    if (!form.name.trim()) { setErr("Name is required"); return; }
    if (!form.role.trim()) { setErr("Role is required"); return; }
    if (!form.birthdate)   { setErr("Birthdate is required"); return; }
    onSave(form);
  };
  const field = {
    display:"block",width:"100%",boxSizing:"border-box",padding:"9px 12px",fontSize:14,
    border:`1px solid ${D.borderHi}`,borderRadius:8,
    background:D.bg2,color:D.text1,marginTop:5,outline:"none",
  };
  const label = {fontSize:12,color:D.text2,display:"block",marginTop:14,fontWeight:500,letterSpacing:"0.03em"};
  return (
    <form onSubmit={submit}>
      {err && <div style={{color:D.red,fontSize:12,marginBottom:8,padding:"8px 12px",background:"#f8717118",borderRadius:8}}>{err}</div>}
      <label style={label}>Name *<input value={form.name} onChange={e=>set("name",e.target.value)} style={field} placeholder="e.g. Grandma Rose"/></label>
      <label style={label}>Role *<input value={form.role} onChange={e=>set("role",e.target.value)} style={field} placeholder="e.g. Grandmother"/></label>
      <label style={label}>Date of birth *<input type="date" value={form.birthdate} onChange={e=>set("birthdate",e.target.value)} style={{...field,colorScheme:"dark"}}/></label>
      <label style={label}>Photo URL (optional)<input value={form.imageUrl} onChange={e=>set("imageUrl",e.target.value)} style={field} placeholder="https://..."/></label>
      <div style={{display:"flex",gap:8,marginTop:20}}>
        <button type="submit" style={{flex:1,padding:"9px",background:D.accent,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:500}}>
          {initial ? "Save changes" : "Add member"}
        </button>
        <button type="button" onClick={onCancel} style={{flex:1,padding:"9px",background:"transparent",border:`1px solid ${D.borderHi}`,borderRadius:8,cursor:"pointer",fontSize:14,color:D.text2}}>
          Cancel
        </button>
      </div>
    </form>
  );
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function Modal({ title, children, onClose }) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16,backdropFilter:"blur(4px)"}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:D.bg1,borderRadius:16,border:`1px solid ${D.borderHi}`,padding:"22px 22px 26px",width:"100%",maxWidth:400,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontSize:16,fontWeight:500,color:D.text1}}>{title}</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:D.text3,fontSize:20,lineHeight:1,padding:4}}
            onMouseEnter={e=>e.currentTarget.style.color=D.text1}
            onMouseLeave={e=>e.currentTarget.style.color=D.text3}>
            <i className="ti ti-x" aria-hidden="true"/>
          </button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Tree node card ────────────────────────────────────────────────────────────
function TreeNode({ member, highlight }) {
  const age = calcAge(member.birthdate);
  const { fg, bg } = palFor(member.name);
  return (
    <div style={{
      background:D.bg1,
      border: highlight ? `1px solid ${fg}66` : `1px solid ${D.border}`,
      borderRadius:12,
      padding:"10px 8px 9px",
      width:110, textAlign:"center",
      display:"inline-flex", flexDirection:"column", alignItems:"center",
      position:"relative",
    }}>
      {highlight && <div style={{position:"absolute",top:0,left:"10%",right:"10%",height:1,background:`linear-gradient(90deg,transparent,${fg},transparent)`}}/>}
      <Avatar member={member} size={40}/>
      <div style={{fontSize:12,fontWeight:500,color:D.text1,marginTop:7,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:94}} title={member.name}>{member.name}</div>
      <div style={{fontSize:10,color:D.text2,marginTop:2}}>{age !== null ? `${age} yrs` : "—"}</div>
      <div style={{fontSize:9,color:fg,marginTop:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:94,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.05em",background:bg,padding:"2px 6px",borderRadius:99}} title={member.role}>{member.role}</div>
    </div>
  );
}

// ── Family Tree View ──────────────────────────────────────────────────────────
function FamilyTreeView({ members }) {
  const byId = Object.fromEntries(members.map(m=>[m.id,m]));
  const gabriella = byId[5];
  const andreas   = byId[6];
  const gpCouples = members.filter(m=>!m.parentId && m.spouseId && m.id < m.spouseId).map(m=>[m,byId[m.spouseId]]).filter(([,s])=>s);
  const children  = members.filter(m=>[5,6].includes(m.parentId)||[5,6].includes(m.parent2Id)).sort((a,b)=>(parseDate(a.birthdate)||0)-(parseDate(b.birthdate)||0));

  const LINE = D.line;

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:0,paddingBottom:24,minWidth:640}}>

      {/* Row 1 — grandparents */}
      <div style={{display:"flex",gap:72,alignItems:"flex-start",justifyContent:"center"}}>
        {gpCouples.map(([p,s])=>{
          const {fg} = palFor(p.name);
          return (
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:0}}>
              <TreeNode member={p}/>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"0 6px"}}>
                <div style={{width:28,height:1.5,background:`${D.heart}66`}}/>
                <div style={{
                  width:22,height:22,borderRadius:"50%",
                  background:`${D.heart}18`,border:`1.5px solid ${D.heart}66`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:11,color:D.heart,
                  margin:"-11px 0",position:"relative",zIndex:1,
                }}>♥</div>
                <div style={{width:28,height:1.5,background:`${D.heart}66`}}/>
              </div>
              <TreeNode member={s}/>
            </div>
          );
        })}
      </div>

      {/* Connector: GPs → parents */}
      <svg width="600" height="64" style={{display:"block",overflow:"visible",flexShrink:0}}>
        <line x1="117" y1="0"  x2="117" y2="32" stroke={LINE} strokeWidth="1.5"/>
        <line x1="117" y1="32" x2="183" y2="32" stroke={LINE} strokeWidth="1.5"/>
        <line x1="183" y1="32" x2="183" y2="64" stroke={LINE} strokeWidth="1.5"/>
        <line x1="483" y1="0"  x2="483" y2="32" stroke={LINE} strokeWidth="1.5"/>
        <line x1="483" y1="32" x2="417" y2="32" stroke={LINE} strokeWidth="1.5"/>
        <line x1="417" y1="32" x2="417" y2="64" stroke={LINE} strokeWidth="1.5"/>
      </svg>

      {/* Row 2 — parents couple */}
      {gabriella && andreas && (
        <div style={{display:"flex",alignItems:"center"}}>
          <TreeNode member={gabriella} highlight/>
          {/* Marriage connector */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"0 8px",gap:0}}>
            <div style={{width:40,height:1.5,background:D.heart}}/>
            <div style={{
              width:26,height:26,borderRadius:"50%",
              background:`${D.heart}22`,
              border:`2px solid ${D.heart}`,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:13,color:D.heart,
              margin:"-13px 0",position:"relative",zIndex:1,
            }}>♥</div>
            <div style={{width:40,height:1.5,background:D.heart}}/>
          </div>
          <TreeNode member={andreas} highlight/>
        </div>
      )}

      {/* Connector: parents → children */}
      <svg width="640" height="52" style={{display:"block",overflow:"visible",flexShrink:0}}>
        <line x1="320" y1="0"  x2="320" y2="26" stroke={LINE} strokeWidth="1.5"/>
        <line x1="65"  y1="26" x2="575" y2="26" stroke={LINE} strokeWidth="1.5"/>
        {[65,195,320,445,575].map(x=>(
          <line key={x} x1={x} y1="26" x2={x} y2="52" stroke={LINE} strokeWidth="1.5"/>
        ))}
      </svg>

      {/* Row 3 — children */}
      <div style={{display:"flex",gap:20,alignItems:"flex-start",justifyContent:"center"}}>
        {children.map(c=><TreeNode key={c.id} member={c}/>)}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [members, setMembers] = useState(() => {
    try {
      if (localStorage.getItem(VERSION_KEY) !== STORAGE_VERSION) {
        localStorage.setItem(VERSION_KEY, STORAGE_VERSION);
        localStorage.removeItem(STORAGE_KEY);
        return DEFAULT_MEMBERS;
      }
      const s = localStorage.getItem(STORAGE_KEY);
      if (s) return JSON.parse(s);
    } catch {}
    return DEFAULT_MEMBERS;
  });
  const [nextId, setNextId] = useState(() => Math.max(...DEFAULT_MEMBERS.map(m=>m.id))+1);
  const [view,    setView]    = useState("cards");
  const [search,  setSearch]  = useState("");
  const [sortBy,  setSortBy]  = useState("birthday");
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);

  useEffect(()=>{ try { localStorage.setItem(STORAGE_KEY,JSON.stringify(members)); } catch {} },[members]);

  function addMember(data) {
    setMembers(ms=>[...ms,{id:nextId,parentId:null,parent2Id:null,spouseId:null,imageUrl:null,...data}]);
    setNextId(n=>n+1); setShowAdd(false);
  }
  function saveMember(data) { setMembers(ms=>ms.map(m=>m.id===editing.id?{...m,...data}:m)); setEditing(null); }
  function deleteMember(id) {
    setMembers(ms=>ms.filter(m=>m.id!==id).map(m=>({...m,
      parentId:m.parentId===id?null:m.parentId,
      parent2Id:m.parent2Id===id?null:m.parent2Id,
      spouseId:m.spouseId===id?null:m.spouseId,
    })));
  }

  const filtered = members
    .filter(m=>m.name.toLowerCase().includes(search.toLowerCase())||m.role.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      if(sortBy==="name") return a.name.localeCompare(b.name);
      if(sortBy==="age")     return (parseDate(a.birthdate)||0)-(parseDate(b.birthdate)||0);
      if(sortBy==="ageDesc") return (parseDate(b.birthdate)||0)-(parseDate(a.birthdate)||0);
      return (nextBday(a.birthdate)||0)-(nextBday(b.birthdate)||0);
    });

  const TAB = (v,icon,lbl) => (
    <button onClick={()=>setView(v)} style={{
      display:"flex",alignItems:"center",gap:7,padding:"7px 16px",fontSize:13,fontWeight:500,
      background: view===v ? `${D.accent}22` : "transparent",
      color: view===v ? D.accent : D.text2,
      border: view===v ? `1px solid ${D.accent}44` : `1px solid transparent`,
      borderRadius:8,cursor:"pointer",transition:"all 0.15s",
    }}>
      <i className={`ti ${icon}`} style={{fontSize:15}} aria-hidden="true"/> {lbl}
    </button>
  );

  return (
    <div style={{background:D.bg0,minHeight:600,padding:"24px 20px 32px",fontFamily:"var(--font-sans)",color:D.text1,borderRadius:12}}>
      <h2 className="sr-only">Family birthday tracker</h2>

      <style>{`
        @keyframes todaypulse{0%,100%{opacity:1}50%{opacity:0.55}}
        .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
        input::placeholder{color:${D.text3}}
        select option{background:${D.bg2};color:${D.text1}}
      `}</style>

      {/* ── Header ── */}
      <div style={{display:"flex",flexWrap:"wrap",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:20}}>
        <div>
          <div style={{fontSize:24,fontWeight:500,color:D.text1,letterSpacing:"-0.02em",lineHeight:1.2}}>
            Family <span style={{color:D.accent}}>Birthdays</span>
          </div>
          <div style={{fontSize:13,color:D.text3,marginTop:4}}>Ages, countdowns &amp; the family tree</div>
        </div>
        {view==="cards" && (
          <button onClick={()=>setShowAdd(true)} style={{
            display:"flex",alignItems:"center",gap:7,
            background:D.accent,color:"#fff",border:"none",
            borderRadius:9,padding:"9px 18px",cursor:"pointer",fontSize:13,fontWeight:500,
            transition:"opacity 0.15s",
          }}
          onMouseEnter={e=>e.currentTarget.style.opacity="0.85"}
          onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
            <i className="ti ti-plus" style={{fontSize:15}} aria-hidden="true"/> Add member
          </button>
        )}
      </div>

      {/* ── Nav tabs ── */}
      <div style={{display:"flex",gap:6,marginBottom:22,padding:"4px",background:D.bg2,borderRadius:10,width:"fit-content",border:`1px solid ${D.border}`}}>
        {TAB("cards","ti-users","Birthday cards")}
        {TAB("tree","ti-hierarchy","Family tree")}
      </div>

      {/* ── Cards view ── */}
      {view==="cards" && (<>
        <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
          <div style={{position:"relative",flex:1,minWidth:160}}>
            <i className="ti ti-search" style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:14,color:D.text3,pointerEvents:"none"}} aria-hidden="true"/>
            <input
              type="text" placeholder="Search name or role…" value={search} onChange={e=>setSearch(e.target.value)}
              style={{width:"100%",boxSizing:"border-box",padding:"9px 10px 9px 34px",fontSize:13,border:`1px solid ${D.borderHi}`,borderRadius:8,background:D.bg2,color:D.text1,outline:"none"}}
            />
          </div>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{padding:"9px 12px",fontSize:13,border:`1px solid ${D.borderHi}`,borderRadius:8,background:D.bg2,color:D.text1,cursor:"pointer",outline:"none"}}>
            <option value="birthday">Next birthday</option>
            <option value="age">Age (oldest first)</option>
            <option value="ageDesc">Age (youngest first)</option>
            <option value="name">Name (A–Z)</option>
          </select>
        </div>

        {filtered.length===0 ? (
          <div style={{textAlign:"center",padding:"56px 16px",color:D.text3}}>
            <i className="ti ti-users" style={{fontSize:44,display:"block",marginBottom:14,color:D.text3}} aria-hidden="true"/>
            <div style={{fontSize:16,fontWeight:500,color:D.text2,marginBottom:6}}>{search?"No members found":"No family members yet"}</div>
            <div style={{fontSize:13}}>{search?"Try a different search.":"Use the button above to add your first member."}</div>
          </div>
        ) : (
          <div className="card-grid">
            {filtered.map(m=><BirthdayCard key={m.id} member={m} onEdit={setEditing} onDelete={deleteMember}/>)}
          </div>
        )}
      </>)}

      {/* ── Tree view ── */}
      {view==="tree" && (
        <div style={{overflowX:"auto",paddingBottom:8}}>
          <div style={{padding:"8px 0 4px",fontSize:12,color:D.text3,marginBottom:16,textAlign:"center"}}>
            Showing the full family from grandparents down to the kids
          </div>
          <FamilyTreeView members={members}/>
        </div>
      )}

      {/* ── Modals ── */}
      {showAdd && <Modal title="Add family member" onClose={()=>setShowAdd(false)}><MemberForm onSave={addMember} onCancel={()=>setShowAdd(false)}/></Modal>}
      {editing  && <Modal title={`Edit ${editing.name}`}  onClose={()=>setEditing(null)}><MemberForm initial={editing} onSave={saveMember} onCancel={()=>setEditing(null)}/></Modal>}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
